name: ci pipeline to build the java code
on:
   push:
     branches: master
  jobs:
     build:
       runs-on: ubuntu-latest
       steps:
        - name: checkout code
          uses: actions/checkout@v3
          with:
           java-versiom:'17'
        - name: validate with maven
          run: mvn validate
        - name: compile with maven
          run: mvn compile
        - name: test with maven
          run: mvn test
        - name: package with maven
          run: mvn package
        - name: verify war file
          run: ls -lh target/
