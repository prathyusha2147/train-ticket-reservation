name: CI/CD PIPELINE TO BUILD AND DEPLOY TO TOMCAT
on:
   push:
     branches: 
      - master
   workflow_dispatch:
   
jobs:
     build:
       runs-on: ubuntu-latest
       
       steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: set up Java
          uses: actions/setup-java@v4
          with:
            java-versiom: '17'
            
        - name: validate with maven
          run: mvn validate
        - name: compile with maven
          run: mvn compile
        - name: test with maven
          run: mvn test
        - name: package with maven
          run: mvn package
        - name: verify war file
          run: ls -lh target/

          # Deploy to Tomcat
        - name: deploy war to tomcat
          run: 
             curl -v -u "${{secrets.TOMCAT_USER}}:${{secrets.TOMCAT_PASSWORD }}" \
                -T target/TrainBook-1.0.0-SNAPSHOT.war \
                "http://${{secrets.TOMCAT_HOST}}:8080/manager/text/deploy?path=/TrainBook&update=true"

          
